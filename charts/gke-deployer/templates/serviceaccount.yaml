{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helpers.serviceAccountName" . }}
  labels:
    {{- include "helpers.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations .Values.serviceAccount.gcpServiceAccount }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.serviceAccount.gcpServiceAccount (not (hasKey .Values.serviceAccount.annotations "iam.gke.io/gcp-service-account")) }}
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
    {{- end }}
  {{- end }}
{{- end }}
