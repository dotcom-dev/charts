{{- if .Values.additionalServices }}
{{- range .Values.additionalServices }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  {{- with .labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .spec }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- if .useDeploymentSelector }}
  selector:
    {{- include "helpers.selectorLabels" $ | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
