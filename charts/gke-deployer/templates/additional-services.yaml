{{- if .Values.additionalServices }}
{{- range .Values.additionalServices }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels:
    {{- include "helpers.labels" $ | nindent 4 }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .type | default "ClusterIP" }}
  {{- with .loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  {{- if .useServicePorts }}
  ports:
    - protocol: TCP
      name: {{ include "helpers.portName" $ }}
      port: {{ $.Values.service.port }}
      targetPort: {{ include "helpers.portName" $ }}
  {{- end }}
  {{- if .useDeploymentSelector }}
  selector:
    {{- include "helpers.selectorLabels" $ | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
